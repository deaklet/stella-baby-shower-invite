<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Shower Invite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta property="og:title" content="You're Invited! Baby Shower">
  <meta property="og:description" content="Join us to celebrate! RSVP and browse the gift registry.">
  <meta property="og:type" content="website">
</head>
<body>
  <main id="app">

    <!-- HERO SECTION -->
    <section id="hero">
      <h1 id="event-title">Baby Shower</h1>
      <div class="divider">
        <span class="divider-ornament">&#10047;</span>
      </div>
      <div class="event-details">
        <p><span class="detail-label">Date</span> <span id="event-date">Loading...</span></p>
        <p><span class="detail-label">Time</span> <span id="event-time"></span></p>
        <p><span class="detail-label">Location</span> <span id="event-location"></span></p>
      </div>
      <p id="event-message" class="welcome-message"></p>
    </section>

    <!-- RSVP SECTION -->
    <section id="rsvp">
      <h2>RSVP</h2>
      <p class="section-subtitle">Please let us know if you can make it.</p>
      <form id="rsvp-form">
        <div class="form-group">
          <label for="rsvp-name">Your Name</label>
          <input type="text" id="rsvp-name" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label>Will you be attending?</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="attending" value="Yes" required>
              <span class="radio-custom"></span>
              Yes, I'll be there!
            </label>
            <label class="radio-label">
              <input type="radio" name="attending" value="No">
              <span class="radio-custom"></span>
              Sorry, I can't make it
            </label>
          </div>
        </div>
        <div class="form-group" id="party-size-group" style="display: none;">
          <label for="party-size">Number of people in your party</label>
          <input type="number" id="party-size" min="1" max="10" value="1">
        </div>
        <div class="form-group">
          <label for="rsvp-notes">Dietary requirements or notes <span class="optional">(optional)</span></label>
          <textarea id="rsvp-notes" rows="3" placeholder="Any allergies, dietary needs, or a message for the parents-to-be..."></textarea>
        </div>
        <button type="submit" class="btn-primary">Submit RSVP</button>
      </form>
    </section>

    <!-- GIFT REGISTRY SECTION -->
    <section id="gifts">
      <h2>Gift Registry</h2>
      <p class="section-subtitle">Select a gift you'd like to bring. Once claimed, it will be marked as taken.</p>
      <div id="gift-grid">
        <p class="loading">Loading gifts...</p>
      </div>
    </section>

    <footer>
      <p>Made with love</p>
    </footer>
  </main>

  <!-- CLAIM MODAL -->
  <div id="claim-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <h3>Claim Gift</h3>
      <p>You're claiming: <strong id="claim-gift-name"></strong></p>
      <input type="hidden" id="claim-row">
      <div class="form-group">
        <label for="claim-name">Your Name</label>
        <input type="text" id="claim-name" placeholder="Enter your name" required>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeClaimModal()">Cancel</button>
        <button class="btn-primary confirm" onclick="confirmClaim()">Claim This Gift</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
