<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Baby Shower Invite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- LOGIN GATE -->
  <div id="login-gate">
    <div class="login-card">
      <h1>Admin Access</h1>
      <form id="login-form">
        <input type="password" id="admin-password" placeholder="Enter admin password" required>
        <button type="submit" class="btn">Sign In</button>
      </form>
      <p id="login-error" class="error" style="display:none;"></p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <main id="admin-panel" style="display: none;">
    <header>
      <h1>Baby Shower Admin</h1>
    </header>

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab active" data-tab="gifts">Gifts</button>
      <button class="tab" data-tab="rsvps">RSVPs</button>
    </div>

    <!-- GIFTS TAB -->
    <div id="tab-gifts" class="tab-content active">
      <div class="toolbar">
        <h2>Gift List</h2>
        <button class="btn btn-add" onclick="openAddGiftForm()">+ Add Gift</button>
      </div>

      <!-- ADD GIFT FORM (hidden by default) -->
      <div id="add-gift-form" class="card" style="display: none;">
        <h3>Add New Gift</h3>
        <form onsubmit="submitAddGift(event)">
          <div class="form-row">
            <input type="text" id="new-gift-name" placeholder="Gift name" required>
            <input type="url" id="new-gift-link" placeholder="Product link (optional)">
            <input type="url" id="new-gift-image" placeholder="Image URL (leave empty to auto-detect)">
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-cancel" onclick="closeAddGiftForm()">Cancel</button>
            <button type="submit" class="btn btn-save">Add Gift</button>
          </div>
        </form>
      </div>

      <div class="table-wrap">
        <table id="gifts-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Image</th>
              <th>Link</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="gifts-tbody"></tbody>
        </table>
      </div>
      <p id="gifts-empty" style="display:none;" class="empty-msg">No gifts added yet.</p>
    </div>

    <!-- RSVPS TAB -->
    <div id="tab-rsvps" class="tab-content">
      <h2>RSVP Responses</h2>
      <div id="rsvp-summary" class="summary-bar"></div>
      <div class="table-wrap">
        <table id="rsvps-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Attending</th>
              <th>Party Size</th>
              <th>Notes</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody id="rsvps-tbody"></tbody>
        </table>
      </div>
      <p id="rsvps-empty" style="display:none;" class="empty-msg">No RSVPs yet.</p>
    </div>
  </main>

  <!-- EDIT GIFT MODAL -->
  <div id="edit-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <h3>Edit Gift</h3>
      <input type="hidden" id="edit-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="edit-gift-name" required>
      </div>
      <div class="form-group">
        <label>Product Link</label>
        <input type="url" id="edit-gift-link">
      </div>
      <div class="form-group">
        <label>Image URL <span style="font-weight:normal;color:#888;">(leave empty to auto-detect)</span></label>
        <input type="url" id="edit-gift-image">
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-save" onclick="submitEditGift()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="admin.js?v=6"></script>
</body>
</html>
